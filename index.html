<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubnet IT</title>
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
<body>

    <header class="app-header">
        <h1 id="header-title">Hubnet IT</h1>
    </header>

    <div class="content-body">
        
        <!-- ЭКРАН 1: ГЛАВНОЕ МЕНЮ -->
        <main id="main-screen">
            <div class="main-banner">
                <img src="images/had-banner.png" alt="Hubnet IT" style="width: 100%; border-radius: 12px;">
            </div>

            <button class="profile-main-btn" id="btn-profile">
                👤 Мой Профиль
            </button>

            <h2 class="block-title">Направления</h2>
            <div class="courses-grid">
                <button class="course-card" id="btn-networks">🌐 Сети</button>
                <button class="course-card" disabled style="opacity: 0.5;">🛡 QA (Скоро)</button>
                <button class="course-card" disabled style="opacity: 0.5;">🐍 Python (Скоро)</button>
                <button class="course-card" disabled style="opacity: 0.5;">📝 Квизы (Скоро)</button>
            </div>
        </main>

        <!-- ЭКРАН 2: УРОКИ СЕТЕЙ -->
        <main id="networks-screen" class="hidden">
            <button id="btn-back-networks" class="back-button">← Назад в меню</button>
            
            <div class="main-banner">
                <img src="images/networks-banner.png" alt="Компьютерные сети" style="width: 100%; border-radius: 12px;">
            </div>
            
            <h2 class="block-title">Компьютерные сети "на пальцах"</h2>
            
            <div class="lessons-list">
                <div class="lesson-item">
                    <p>📚 Урок 1: Что такое IP-адрес?</p>
                    <span class="xp-badge">⭐ 50 XP</span>
                    <button class="action-btn">Начать →</button>
                </div>
                
                <div class="lesson-item">
                    <p>🌐 Урок 2: DNS-серверы</p>
                    <span class="xp-badge">⭐ 50 XP</span>
                    <button class="action-btn">Начать →</button>
                </div>
                
                <div class="lesson-item locked">
                    <p>🔒 Урок 3: Протоколы TCP/IP</p>
                    <span class="xp-badge">🔒 Требуется 100 XP</span>
                </div>
                
                <div class="lesson-item locked">
                    <p>🔒 Урок 4: Сетевая безопасность</p>
                    <span class="xp-badge">🔒 Требуется 200 XP</span>
                </div>
            </div>
        </main>

        <!-- ЭКРАН 3: ПРОФИЛЬ ДЕНИСА -->
        <main id="profile-screen" class="hidden">
            <button id="btn-back-profile" class="back-button">← Назад в меню</button>
            
            <div class="profile-card">
                <div class="profile-avatar">👤</div>
                <h2 class="profile-name">Денис</h2>
                <p class="profile-role">Студент академии</p>
                
                <div class="stats-container">
                    <div class="stat-box">
                        <span class="stat-val">0 / 4</span>
                        <span class="stat-lbl">Уроков пройдено</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-val">0</span>
                        <span class="stat-lbl">Очков XP</span>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
