<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubnet IT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Шапка приложения -->
    <header class="app-header">
        <h1 id="header-title">Hubnet IT</h1>
    </header>

    <!-- ЭКРАН 1: ГЛАВНОЕ МЕНЮ -->
    <main id="main-screen" class="dashboard">
        <div class="main-banner">
            <!-- Имя файлаhad-banner.png, как мы выяснили -->
            <img src="images/had-banner.png" alt="Hubnet IT" style="width: 100%; border-radius: 12px;">
        </div>

        <div class="content-body">
            <!-- Большая кнопка профиля по центру -->
            <button class="profile-main-btn" id="btn-profile">
                👤 Мой Профиль
            </button>

            <h2 class="block-title">Направления</h2>
            <div class="courses-grid">
                <button class="course-card" id="btn-networks">🌐 Сети</button>
                <button class="course-card" style="opacity: 0.5;" disabled>🛡 QA (Скоро)</button>
                <button class="course-card" style="opacity: 0.5;" disabled>🐍 Python (Скоро)</button>
            </div>
        </div>
    </main>

    <!-- ЭКРАН 2: РАЗДЕЛ СЕТЕЙ -->
    <main id="networks-screen" class="dashboard hidden">
        <div class="content-body">
            <button id="btn-back-networks" class="back-button">← Назад в меню</button>
            <div class="main-banner">
                <img src="images/networks-banner.png" alt="Компьютерные сети" style="width: 100%; border-radius: 12px;">
            </div>
            <h2 class="block-title">Компьютерные сети "на пальцах"</h2>
            
            <div class="lessons-list">
                <!-- Сюда потом вернутся твои уроки -->
                <div class="lesson-item">Урок 1: Что такое IP-адрес?</div>
            </div>
        </div>
    </main>

    <!-- ЭКРАН 3: ПРОФИЛЬ -->
    <main id="profile-screen" class="dashboard hidden">
        <div class="content-body">
            <button id="btn-back-profile" class="back-button">← Назад в меню</button>
            
            <div class="profile-card">
                <div class="profile-avatar">👤</div>
                <h2 class="profile-name">Денис</h2>
                <p class="profile-role">Студент академии</p>
                
                <div class="stats-container">
                    <div class="stat-box">
                        <span class="stat-val">1 / 5</span>
                        <span class="stat-lbl">Уроков</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-val" id="user-xp">150</span>
                        <span class="stat-lbl">Очков XP</span>
                    </div>
                </div>

                <div class="xp-info">
                    <p>💡 <strong>Как получать очки:</strong></p>
                    <ul>
                        <li>За пройденный урок: +50 XP</li>
                        <li>За успешный квиз: +25 XP</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
