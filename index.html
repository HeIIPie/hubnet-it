<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hubnet IT — Обучающая игра</title>
    <link rel="stylesheet" href="style.css">
    <!-- Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <!-- ЭКРАН 1: ГЛАВНОЕ МЕНЮ -->
    <div id="main-app" class="container">
        <!-- Баннер -->
        <div class="logo-container">
            <img src="images/had-banner.png" alt="Hubnet Logo" class="main-logo">
        </div>
        
        <!-- Кнопка профиля -->
        <button id="btn-profile" class="btn-profile-main">
            👤 Мой Профиль
        </button>
        
        <!-- Разделитель -->
        <div class="divider"></div>
        
        <!-- Кнопки направлений -->
        <div class="menu-buttons">
            <button id="btn-computer-networks" class="btn-menu">🔌 Компьютерные сети</button>
            <button id="btn-quizzes" class="btn-menu locked-menu" disabled>📝 Квизы (Скоро)</button>
            <button id="btn-coming-soon" class="btn-menu locked-menu" disabled>🔒 Базы данных (Скоро)</button>
        </div>
    </div>

    <!-- ЭКРАН 2: ВЫБОР УРОКОВ -->
    <div id="lessons-screen" class="hidden container">
        <div class="header">
            <button id="btn-lessons-back" class="btn-back">← Меню</button>
            <h2>Компьютерные сети</h2>
        </div>
        
        <div class="lessons-list" id="lessons-list">
            <!-- Карточки уроков сгенерируются из js/ui.js -->
        </div>
    </div>

    <!-- ЭКРАН 3: МИНИ-ЛЕКЦИЯ -->
    <div id="lecture-screen" class="hidden container">
        <div class="header">
            <button id="btn-lecture-back" class="btn-back">← Уроки</button>
            <h2 id="lecture-title">Загрузка...</h2>
        </div>
        
        <div class="lecture-content-wrapper">
            <div class="lecture-text" id="lecture-text">
                <!-- Текст лекции подставится из js/data/lessons.js -->
            </div>
        </div>
        
        <div class="lecture-footer">
            <button id="btn-start-practice" class="btn-action">Начать практику 🎮</button>
        </div>
    </div>

    <!-- ЭКРАН 4: ИГРОВОЕ ПОЛЕ -->
    <div id="game-screen" class="hidden container">
        <div class="header">
            <button id="btn-back" class="btn-back">← Выход</button>
            <div class="score-container">
                <button id="btn-shuffle" class="btn-shuffle">🔄 Смешать</button>
            </div>
        </div>
    <!-- Щиты и Комбо -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <div id="shields-display" style="font-size: 1.4rem; letter-spacing: 2px;">🛡️ 🛡️ 🛡️</div>
            <div id="combo-display" style="font-size: 0.9rem; color: #64748b;">🔥 Комбо: 0</div>
    </div>
        <!-- Шкала прогресса -->
        <div class="progress-container">
            <div class="progress-bar-wrapper">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="progress-text" class="progress-text">Зарядка: 0%</div>
        </div>

        <!-- Сетка "Три в ряд" -->
        <div id="game-board" class="game-board">
            <!-- Плитки сгенерируются из js/game.js -->
        </div>

        <!-- МОДАЛЬНОЕ ОКНО КВИЗА -->
        <div id="quiz-modal" class="quiz-modal hidden">
            <div class="quiz-content">
                <div class="quiz-header">
                    <span class="quiz-badge">Проверка знаний</span>
                </div>
                <h3 id="quiz-question">Загрузка вопроса...</h3>
                <div id="quiz-answers" class="quiz-answers">
                    <!-- Кнопки ответов сгенерируются динамически -->
                </div>
            </div>
        </div>
    </div>

    <!-- Подключаем модули -->
    <script type="module" src="app.js"></script>
</body>
</html>
